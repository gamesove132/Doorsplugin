name: DoorsPlugin
version: 2.0.0
main: me.doors.DoorsPlugin
api-version: '1.21'
description: DOORS mini-game — full faithful recreation for Paper/Spigot
authors: [DoorsPlugin]
prefix: DOORS

commands:
  doors:
    description: DOORS command
    usage: /doors <start|stop|join|leave|reload|setlobby|info>
    aliases: [door, d]
  doorsgive:
    description: Give DOORS selector item
    usage: /doorsgive [player]
    permission: doors.admin

permissions:
  doors.admin:
    description: Full admin access
    default: op
  doors.play:
    description: Join game
    default: true
