# ============================================================
#  DOORS Plugin v2.0  -  config.yml
# ============================================================

game:
  max-rooms: 100
  room-width: 15
  room-height: 8
  room-length: 20
  corridor-gap: 1        # wall blocks between rooms
  start-x: 0
  start-y: 64
  start-z: 0
  game-world: "doors_world"

lobby:
  world: "world"
  spawn-x: 0.5
  spawn-y: 65.0
  spawn-z: 0.5
  # Portal positions (relative to spawn, set by /doors setlobby)
  portal-1-x: 5
  portal-1-y: 65
  portal-1-z: 0
  portal-2-x: 8
  portal-2-y: 65
  portal-2-z: 0
  portal-3-x: 11
  portal-3-y: 65
  portal-3-z: 0
  portal-4-x: 14
  portal-4-y: 65
  portal-4-z: 0
  # Seconds before auto-start if solo in portal
  solo-wait-seconds: 15

selector-item:
  # NBT key used to identify the custom item so it won't break survival
  nbt-key: "doors_selector"
  # Material for selector axe
  material: IRON_AXE
  max-stack: 1

elevator:
  # Room numbers that have elevator checkpoints
  checkpoints: [50, 100]
  # How many seconds to show the elevator cutscene
  cutscene-ticks: 100

entities:
  rush:
    spawn-chance: 0.15
    speed-blocks-per-tick: 0.9
    warning-sound-distance: 25
    # Flicker duration before Rush arrives (ticks)
    flicker-ticks: 40
  ambush:
    spawn-chance: 0.05
    bounces: 8
    speed: 0.7
  eyes:
    spawn-chance: 0.25
    damage-per-tick: 2
    # Dot product threshold for "looking at" (0.97 ≈ 14°)
    look-threshold: 0.97
    grace-ticks: 8
  screech:
    spawn-chance: 0.10
    damage: 20
    # Min ticks idle before screech attacks
    idle-ticks: 30
  dupe:
    # First possible room
    first-room: 21
    spawn-chance: 0.12
    damage: 40
  halt:
    # Rooms where Halt can appear
    first-room: 60
    spawn-chance: 0.08
    damage: 60
  seek:
    trigger-rooms: [40, 70]
    speed: 0.55
    duration-ticks: 600
  figure:
    spawn-rooms: [50, 100]
    patrol-speed: 0.15
    hearing-range: 10.0
    # Boss room (100) is more aggressive
    boss-hearing-range: 8.0

rooms:
  normal-weight: 50
  dark-weight: 22
  ambush-weight: 10
  treasure-weight: 12
  lever-weight: 6

messages:
  prefix: "&8[&6DOORS&8] "
  join: "&aВи приєднались до DOORS! Дорога чекає..."
  leave: "&7Ви покинули гру."
  start: "&6&lГра починається! Виживайте в 100 кімнатах!"
  win: "&6&l✦ ВИ ПРОЙШЛИ DOORS! ✦ &7Подолано: 100 кімнат"
  death: "&c&l✖ ЗАГИНУВ &7в кімнаті &e{room}"
  room: "&7Кімната &e{room}&8/&e100"
  no-game: "&cНемає активної гри."
  already-in-game: "&cВи вже в грі!"
  rush-warning: "&c&l⚡ Світло моргає... ХОВАЙСЯ!"
  eyes-warning: "&5&lНЕ ДИВИСЬ НА НЬОГО!"
  seek-warning: "&4&l☠ ВОНО НАБЛИЖАЄТЬСЯ! ТІКАЙ!"
  figure-warning: "&5ФІГУРА чує тебе! Повільніше!"
  halt-warning: "&b&lHALT — РОЗВЕРНИСЬ!"
  dupe-warning: "&eОбережно — одні з дверей фальшиві!"
  elevator-arrive: "&aЛіфт прибув. Відпочиньте..."
  elevator-depart: "&6Ліфт їде далі..."
  lobby-portal-wait: "&7Очікування гравців: &e{count}&7/&e{max} &8(&e{time}s&8)"
